<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interview Prep | Professional AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #ffffff; }
        .chat-container { height: calc(100vh - 160px); }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .message-appear { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .input-area { box-shadow: 0 -5px 20px rgba(0,0,0,0.02); }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <!-- HEADER -->
    <header class="border-b border-gray-100 px-6 py-4 flex justify-between items-center bg-white z-10">
        <div>
            <h1 class="text-xl font-extrabold tracking-tighter text-black">INTERVIEW PREP</h1>
            <p class="text-[10px] text-gray-400 font-medium uppercase tracking-widest">Practice. Improve. Crack Your Interview.</p>
        </div>
        <div id="session-info" class="text-right">
            <span id="difficulty-badge" class="hidden px-2 py-1 rounded bg-slate-100 text-[10px] font-bold text-slate-600 uppercase mr-2"></span>
            <span id="timer" class="hidden font-mono text-sm text-red-500 font-bold tracking-tighter">00:00</span>
        </div>
    </header>

    <!-- CHAT BOX -->
    <main id="chat-box" class="flex-1 overflow-y-auto px-4 md:px-0 py-8 hide-scroll bg-white">
        <div id="chat-content" class="max-w-3xl mx-auto space-y-8 flex flex-col pb-20">
            <!-- Messages injected here -->
        </div>
    </main>

    <!-- INPUT AREA -->
    <footer class="input-area bg-white border-t border-gray-100 p-4 pb-8">
        <div class="max-w-3xl mx-auto relative">
            <div id="options-ui" class="flex flex-wrap gap-2 mb-4 justify-center"></div>
            
            <div class="relative group">
                <textarea id="user-input" rows="1" 
                    class="w-full p-4 pr-14 bg-gray-50 border border-gray-200 rounded-2xl focus:outline-none focus:ring-2 focus:ring-black focus:bg-white transition-all resize-none text-sm"
                    placeholder="Type your answer here..."></textarea>
                <button id="send-btn" class="absolute right-3 top-3 p-2 bg-black text-white rounded-xl hover:scale-105 active:scale-95 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 10.5L12 3m0 0l7.5 7.5M12 3v18" />
                    </svg>
                </button>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
